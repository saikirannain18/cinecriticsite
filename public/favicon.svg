<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#080808"/>
  
  <!-- Film reel outer circle -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#F5C518" stroke-width="1.5"/>
  
  <!-- Film reel center -->
  <circle cx="16" cy="16" r="4" fill="#F5C518"/>
  <circle cx="16" cy="16" r="2" fill="#080808"/>
  
  <!-- Film reel holes (6 around the circle) -->
  <circle cx="16" cy="5"  r="2" fill="#F5C518"/>
  <circle cx="16" cy="27" r="2" fill="#F5C518"/>
  <circle cx="5"  cy="16" r="2" fill="#F5C518"/>
  <circle cx="27" cy="16" r="2" fill="#F5C518"/>
  <circle cx="8.2"  cy="8.2"  r="2" fill="#F5C518"/>
  <circle cx="23.8" cy="23.8" r="2" fill="#F5C518"/>
</svg>
